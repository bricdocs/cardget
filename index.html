<!doctype html> 
<html lang="tr"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>İskambil Barkod Okuyucu</title> 
    <style> 
        body { 
            font-family: arial, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        } 
        h2 { 
            margin: 10px 0; 
            color: #00ffcc; 
            font-size: 1.2rem; 
        } 
        .container { 
            position: relative; 
            width: 100%; 
            max-width: 400px; 
            border-radius: 8px; 
            overflow: hidden; 
            background: #222;
            height: 340px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        } 
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
            transform: scaleX(-1); /* Ekran Aynalaması */
        } 
        canvas { 
            display: none; 
        } 
        .overlay { 
            position: absolute; 
            top: 35%; 
            left: 5%; 
            width: 90%; 
            height: 25%; 
            border: 3px dashed #00ffcc; 
            box-sizing: border-box; 
            pointer-events: none; 
            z-index: 10; 
        } 
        .overlay-text { 
            position: absolute; 
            top: -25px; 
            left: 0; 
            color: #00ffcc; 
            font-size: 0.8rem; 
            background: rgba(0,0,0,0.6); 
            padding: 2px 5px; 
        } 
        .scan-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 0, 0, 0.9); 
            z-index: 11;
        }
        .result-box { 
            margin-top: 15px; 
            width: 90%; 
            max-width: 360px; 
            background: #1e1e1e; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            text-align: center; 
        } 
        .binary { 
            font-size: 1.6rem; 
            font-weight: bold; 
            color: #ffcc00; 
            letter-spacing: 4px; 
            margin: 5px 0; 
        } 
        .card-name { 
            font-size: 1.8rem; 
            font-weight: bold; 
            color: #00ffaa; 
        } 
        .status { 
            font-size: 0.9rem; 
            color: #00ffcc; 
            margin-top: 5px; 
        } 
    </style> 
</head>
<body>

    <h2>İskambil Barkod Taraması</h2>

    <div class="container">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay">
            <span class="overlay-text">Barkodu Hizalayın (Ön Kamera)</span>
            <div class="scan-line"></div>
        </div>
    </div>

    <canvas id="analyzerCanvas"></canvas>

    <div class="result-box">
        <div class="status" id="status">Kamera başlatılıyor...</div>
        <div class="binary" id="binaryResult">000000</div>
        <div class="card-name" id="cardResult">-</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('analyzerCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const binaryResult = document.getElementById('binaryResult');
        const cardResult = document.getElementById('cardResult');

        let audioCtx = null;
        let isFrozen = false;

        function playBeep() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let oscillator = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                oscillator.type = "sine";
                oscillator.frequency.value = 1400; 
                gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime); 
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.06); 
            } catch (e) {
                console.error(e);
            }
        }

        const cardDatabase = {
            "000001": "Sinek As (A♣)", "000010": "Sinek 2 (2♣)", "000011": "Sinek 3 (3♣)", "000100": "Sinek 4 (4♣)",
            "000101": "Sinek 5 (5♣)", "000110": "Sinek 6 (6♣)", "000111": "Sinek 7 (7♣)", "001000": "Sinek 8 (8♣)",
            "001001": "Sinek 9 (9♣)", "001010": "Sinek 10 (10♣)", "001011": "Sinek Vale (J♣)", "001100": "Sinek Kız (Q♣)",
            "001101": "Sinek Papaz (K♣)",
            "001110": "Karo As (A♦)", "001111": "Karo 2 (2♦)", "010000": "Karo 3 (3♦)", "010001": "Karo 4 (4♦)",
            "010010": "Karo 5 (5♦)", "010011": "Karo 6 (6♦)", "010100": "Karo 7 (7♦)", "010101": "Karo 8 (8♦)",
            "010110": "Karo 9 (9♦)", "010111": "Karo 10 (10♦)", "011000": "Karo Vale (J♦)", "011001": "Karo Kız (Q♦)",
            "011010": "Karo Papaz (K♦)",
            "011011": "Kupa As (A♥)", "011100": "Kupa 2 (2♥)", "011101": "Kupa 3 (3♥)", "011110": "Kupa 4 (4♥)",
            "011111": "Kupa 5 (5♥)", "100000": "Kupa 6 (6♥)", "100001": "Kupa 7 (7♥)", "100010": "Kupa 8 (8♥)",
            "100011": "Kupa 9 (9♥)", "100100": "Kupa 10 (10♥)", "100101": "Kupa Kız (Q♥)", "100110": "Kupa Vale (J♥)",
            "100111": "Kupa Papaz (K♥)",
            "101000": "Maça As (A♠)", "101001": "Maça 2 (2♠)", "101010": "Maça 3 (3♠)", "101011": "Maça 4 (4♠)",
            "101100": "Maça 5 (5♠)", "101101": "Maça 6 (6♠)", "101110": "Maça 7 (7♠)", "101111": "Maça 8 (8♠)",
            "110000": "Maça 9 (9♠)", "110001": "Maça 10 (10♠)", "110010": "Maça Vale (J♠)", "110011": "Maça Kız (Q♠)",
            "110100": "Maça Papaz (K♠)"
        };
        async function initCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                statusText.innerHTML = "<span style='color:#ff3333'>HATA: HTTPS gerekli!</span>";
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                video.srcObject = stream;
                statusText.innerText = "Ön kamera aktif. Çizgiler aranıyor...";
                requestAnimationFrame(analyzeFrame);
            } catch (err) {
                statusText.innerHTML = "<span style='color:#ff3333'>Kamera Erişim Hatası: " + err.name + "</span>";
            }
        }

        function analyzeFrame() {
            if (isFrozen || video.paused || video.ended || video.readyState < 2) {
                requestAnimationFrame(analyzeFrame);
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // Kamera görüntüsü canvas üzerine ham haliyle çiziliyor
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            try {
                let cropX = Math.floor(canvas.width * 0.15);
                let cropWidth = Math.floor(canvas.width * 0.70);
                let centerY = Math.floor(canvas.height * 0.47);

                let imgData = ctx.getImageData(cropX, centerY, cropWidth, 1);
                let pixels = imgData.data;

                // CRITICAL FIX: Döngüyü düz okumak yerine SAĞDAN SOLA (Tersine) dolduruyoruz!
                // Böylece ekrandaki ayna görüntüsü ile yazılımın okuma yönü birebir eşitleniyor.
                let lumaValues = [];
                for (let i = pixels.length - 4; i >= 0; i -= 4) {
                    let bright = pixels[i] * 0.299 + pixels[i+1] * 0.587 + pixels[i+2] * 0.114;
                    lumaValues.push(bright);
                }

                let max = Math.max(...lumaValues);
                let min = Math.min(...lumaValues);
                let contrast = max - min;

                // Boşta bipleme engelleyici bariyer
                if (contrast < 110) {
                    binaryResult.innerText = "000000";
                    cardResult.innerText = "-";
                    statusText.innerText = "Barkod çizgilerini kırmızı hatta tam ortalayın.";
                    requestAnimationFrame(analyzeFrame);
                    return;
                }

                let threshold = min + contrast * 0.5;

                let binarySegment = [];
                for (let i = 0; i < lumaValues.length; i++) {
                    binarySegment.push(lumaValues[i] > threshold ? 1 : 0);
                }

                let currentBit = binarySegment[0];
                let runLen = 0;
                let runs = [];

                for (let i = 0; i < binarySegment.length; i++) {
                    if (binarySegment[i] === currentBit) {
                        runLen++;
                    } else {
                        runs.push({ bit: currentBit, length: runLen });
                        currentBit = binarySegment[i];
                        runLen = 1;
                    }
                }
                runs.push({ bit: currentBit, length: runLen });

                let validRuns = runs.filter(r => r.length > 4);

                if (validRuns.length >= 6) {
                    let totalLen = 0;
                    for(let k = 0; k < 6; k++) totalLen += validRuns[k].length;
                    let avgLen = totalLen / 6;

                    let binaryString = "";
                    for (let j = 0; j < 6; j++) {
                        binaryString += validRuns[j].length > avgLen ? "1" : "0";
                    }

                    binaryResult.innerText = binaryString;
                    
                    if (cardDatabase[binaryString]) {
                        cardResult.innerText = cardDatabase[binaryString];
                        statusText.innerText = "Kart başarıyla algılandı!";
                        playBeep();
                        
                        isFrozen = true;
                        setTimeout(() => { isFrozen = false; }, 1500);
                        return;
                    } else {
                        cardResult.innerText = "Hatalı Simetri";
                        statusText.innerText = "Kartı hafifçe ileri-geri hareket ettirin.";
                    }
                } else {
                    statusText.innerText = "Çizgiler taranıyor, odağı koruyun...";
                }

            } catch (e) {
                console.error(e);
            }

            requestAnimationFrame(analyzeFrame);
        }

        if (document.readyState === "loading") {
            window.addEventListener('DOMContentLoaded', initCamera);
        } else {
            initCamera();
        }
    </script>
</body>
</html>
