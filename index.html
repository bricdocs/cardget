<!doctype html> 
<html lang="tr"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>İskambil Barkod Okuyucu</title> 
    <style> 
        body { 
            font-family: arial, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        } 
        h2 { 
            margin: 10px 0; 
            color: #00ffcc; 
            font-size: 1.2rem; 
        } 
        .container { 
            position: relative; 
            width: 100%; 
            max-width: 400px; 
            border-radius: 8px; 
            overflow: hidden; 
            background: #222;
            height: 340px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        } 
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
            transform: scaleX(-1); 
        } 
        canvas { 
            display: none; 
        } 
        .overlay { 
            position: absolute; 
            top: 35%; 
            left: 5%; 
            width: 90%; 
            height: 25%; 
            border: 3px dashed #00ffcc; 
            box-sizing: border-box; 
            pointer-events: none; 
            z-index: 10; 
        } 
        .overlay-text { 
            position: absolute; 
            top: -25px; 
            left: 0; 
            color: #00ffcc; 
            font-size: 0.8rem; 
            background: rgba(0,0,0,0.6); 
            padding: 2px 5px; 
        } 
        .scan-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 0, 0, 0.8); 
            z-index: 11;
        }
        .result-box { 
            margin-top: 15px; 
            width: 90%; 
            max-width: 360px; 
            background: #1e1e1e; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            text-align: center; 
        } 
        .binary { 
            font-size: 1.6rem; 
            font-weight: bold; 
            color: #ffcc00; 
            letter-spacing: 4px; 
            margin: 5px 0; 
        } 
        .card-name { 
            font-size: 1.8rem; 
            font-weight: bold; 
            color: #00ffaa; 
        } 
        .status { 
            font-size: 0.9rem; 
            color: #00ffcc; 
            margin-top: 5px; 
        } 
        .controls {
            margin-top: 15px;
            width: 90%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 0.85rem;
            color: #aaa;
        }
        .slider-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #222;
        }
        input[type=range] {
            flex-grow: 1;
            margin-left: 10px;
            accent-color: #00ffcc;
        }
    </style> 
</head>
<body>

    <h2>İskambil Barkod Taraması</h2>

    <div class="container">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay">
            <span class="overlay-text">Barkodu Kırmızı Çizgiye Hizalayın</span>
            <div class="scan-line"></div>
        </div>
    </div>

    <canvas id="analyzerCanvas"></canvas>

    <div class="result-box">
        <div class="status" id="status">Kamera başlatılıyor...</div>
        <div class="binary" id="binaryResult">000000</div>
        <div class="card-name" id="cardResult">-</div>
    </div>

    <div class="controls">
        <div class="slider-container">
            <span>Netlik/Işık Hassasiyeti:</span>
            <input type="range" id="sensitivitySlider" min="20" max="80" value="50">
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('analyzerCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const binaryResult = document.getElementById('binaryResult');
        const cardResult = document.getElementById('cardResult');
        const sensitivitySlider = document.getElementById('sensitivitySlider');

        let audioCtx = null;
        let isFrozen = false;

        function playBeep() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let oscillator = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                oscillator.type = "sine";
                oscillator.frequency.value = 1400; 
                gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime); 
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.06); 
            } catch (e) {
                console.error(e);
            }
        }

        const cardDatabase = {
            "000001": "Sinek As (A♣) [ID:1]",     "000010": "Sinek 2 (2♣) [ID:2]",     "000011": "Sinek 3 (3♣) [ID:3]",
            "000100": "Sinek 4 (4♣) [ID:4]",     "000101": "Sinek 5 (5♣) [ID:5]",     "000110": "Sinek 6 (6♣) [ID:6]",
            "000111": "Sinek 7 (7♣) [ID:7]",     "001000": "Sinek 8 (8♣) [ID:8]",     "001001": "Sinek 9 (9♣) [ID:9]",
            "001010": "Sinek 10 (10♣) [ID:10]",  "001011": "Sinek Vale (J♣) [ID:11]", "001100": "Sinek Kız (Q♣) [ID:12]",
            "001101": "Sinek Papaz (K♣) [ID:13]",
            "001110": "Karo As (A♦) [ID:14]",    "001111": "Karo 2 (2♦) [ID:15]",     "010000": "Karo 3 (3♦) [ID:16]",
            "010001": "Karo 4 (4♦) [ID:17]",     "010010": "Karo 5 (5♦) [ID:18]",     "010011": "Karo 6 (6♦) [ID:19]",
            "010100": "Karo 7 (7♦) [ID:20]",     "010101": "Karo 8 (8♦) [ID:21]",     "010110": "Karo 9 (9♦) [ID:22]",
            "010111": "Karo 10 (10♦) [ID:23]",   "011000": "Karo Vale (J♦) [ID:24]",  "011001": "Karo Kız (Q♦) [ID:25]",
            "011010": "Karo Papaz (K♦) [ID:26]",
            "011011": "Kupa As (A♥) [ID:27]",    "011100": "Kupa 2 (2♥) [ID:28]",     "011101": "Kupa 3 (3♥) [ID:29]",
            "011110": "Kupa 4 (4♥) [ID:30]",     "011111": "Kupa 5 (5♥) [ID:31]",     "100000": "Kupa 6 (6♥) [ID:32]",
            "100001": "Kupa 7 (7♥) [ID:33]",     "100010": "Kupa 8 (8♥) [ID:34]",     "100011": "Kupa 9 (9♥) [ID:35]",
            "100100": "Kupa 10 (10♥) [ID:36]",   "100101": "Kupa Kız (Q♥) [ID:37]",   "100110": "Kupa Vale (J♥) [ID:38]",
            "100111": "Kupa Papaz (K♥) [ID:39]",
            "101000": "Maça As (A♠) [ID:40]",    "101001": "Maça 2 (2♠) [ID:41]",     "101010": "Maça 3 (3♠) [ID:42]",
            "101011": "Maça 4 (4♠) [ID:43]",     "101100": "Maça 5 (5♠) [ID:44]",     "101101": "Maça 6 (6♠) [ID:45]",
            "101110": "Maça 7 (7♠) [ID:46]",     "101111": "Maça 8 (8♠) [ID:47]",     "110000": "Maça 9 (9♠) [ID:48]",
            "110001": "Maça 10 (10♠) [ID:49]",   "110010": "Maça Vale (J♠) [ID:50]",  "110011": "Maça Kız (Q♠) [ID:51]",
            "110100": "Maça Papaz (K♠) [ID:52]"
        };
        async function initCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                statusText.innerHTML = "<span style='color:#ff3333'>HATA: HTTPS gerekli!</span>";
                return;
            }
            try {
                // Makro çekimler için donanımsal odak kilitleyici parametreler entegre edildi
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "user", 
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 },
                        advanced: [{ focusMode: "continuous" }] /* Donanımsal sürekli odak modu */
                    },
                    audio: false
                });
                video.srcObject = stream;
                statusText.innerText = "Sistem Aktif. Barkod bekleniyor...";
                requestAnimationFrame(analyzeFrame);
            } catch (err) {
                statusText.innerHTML = "<span style='color:#ff3333'>Kamera Erişim Hatası: " + err.name + "</span>";
            }
        }

        // YAZILIMSAL DİJİTAL NETLEŞTİRME FİLTRESİ (Sharpen Convolution Filter)
        function sharpenMatrix(data, w, h) {
            let weights = [0, -1, 0, -1, 5, -1, 0, -1, 0]; // Keskinlik kazandırma matrisi
            let side = Math.round(Math.sqrt(weights.length));
            let halfSide = Math.floor(side / 2);
            let output = new Uint8ClampedArray(data.length);

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    let sy = y;
                    let sx = x;
                    let dstOff = (y * w + x) * 4;
                    let r = 0, g = 0, b = 0;

                    for (let cy = 0; cy < side; cy++) {
                        for (let cx = 0; cx < side; cx++) {
                            let scy = Math.min(h - 1, Math.max(0, sy + cy - halfSide));
                            let scx = Math.min(w - 1, Math.max(0, sx + cx - halfSide));
                            let srcOff = (scy * w + scx) * 4;
                            let wt = weights[cy * side + cx];
                            r += data[srcOff] * wt;
                            g += data[srcOff + 1] * wt;
                            b += data[srcOff + 2] * wt;
                        }
                    }
                    output[dstOff] = Math.min(255, Math.max(0, r));
                    output[dstOff + 1] = Math.min(255, Math.max(0, g));
                    output[dstOff + 2] = Math.min(255, Math.max(0, b));
                    output[dstOff + 3] = data[dstOff + 3];
                }
            }
            return output;
        }

        function analyzeFrame() {
            // Eğer ekran dondurulmuşsa (Freeze) taramayı 1.2 saniyeliğine askıya al
            if (isFrozen || video.paused || video.ended || video.readyState < 2) {
                requestAnimationFrame(analyzeFrame);
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.setTransform(1, 0, 0, 1, 0, 0);

            try {
                let cropX = Math.floor(canvas.width * 0.15);
                let cropWidth = Math.floor(canvas.width * 0.70);
                let centerY = Math.floor(canvas.height * 0.47);

                // Tarama hattının çevresindeki küçük pürüzlü dikey şeridi çekiyoruz
                let zoneH = 9;
                let imgData = ctx.getImageData(cropX, centerY - 4, cropWidth, zoneH);
                
                // Bulanık pikselleri jilet gibi keskin çizgilere çevirmek için filtreyi çalıştır
                let sharpPixels = sharpenMatrix(imgData.data, cropWidth, zoneH);

                let lumaValues = [];
                let noiseCheck = 0;

                // Keskinleştirilmiş pikselleri dikey olarak süz ve doğrula
                for (let col = 0; col < cropWidth; col++) {
                    let idx1 = (0 * cropWidth + col) * 4; // Üst satır
                    let idx2 = (4 * cropWidth + col) * 4; // Orta (Kırmızı hat)
                    let idx3 = (8 * cropWidth + col) * 4; // Alt satır

                    let b1 = sharpPixels[idx1] * 0.299 + sharpPixels[idx1+1] * 0.587 + sharpPixels[idx1+2] * 0.114;
                    let b2 = sharpPixels[idx2] * 0.299 + sharpPixels[idx2+1] * 0.587 + sharpPixels[idx2+2] * 0.114;
                    let b3 = sharpPixels[idx3] * 0.299 + sharpPixels[idx3+1] * 0.587 + sharpPixels[idx3+2] * 0.114;

                    noiseCheck += (Math.abs(b1 - b2) + Math.abs(b2 - b3));
                    lumaValues.push(b2);
                }

                let max = Math.max(...lumaValues);
                let min = Math.min(...lumaValues);
                let contrast = max - min;

                // YÜKSEK GÜVENLİK BARİYERLERİ: Boş odada veya düz zeminde biplemeyi tamamen keser
                if (contrast < 110 || (noiseCheck / cropWidth) > 18) {
                    binaryResult.innerText = "000000";
                    cardResult.innerText = "-";
                    statusText.innerText = "Barkod çizgilerini kırmızı hatta yaklaştırın.";
                    setTimeout(analyzeFrame, 130);
                    return;
                }

                let sliderFactor = parseInt(sensitivitySlider.value) / 100;
                let threshold = min + contrast * sliderFactor;

                let currentBit = lumaValues[0] > threshold ? 1 : 0;
                let bitRunLength = 0;
                let runs = [];

                for (let i = 0; i < lumaValues.length; i++) {
                    let bit = lumaValues[i] > threshold ? 1 : 0;
                    if (bit === currentBit) {
                        bitRunLength++;
                    } else {
                        runs.push({ bit: currentBit, length: bitRunLength });
                        currentBit = bit;
                        bitRunLength = 1;
                    }
                }
                runs.push({ bit: currentBit, length: bitRunLength });

                let validRuns = runs.filter(r => r.length > 5);
                
                if (validRuns.length === 6) {
                    let totalLen = validRuns.reduce((sum, r) => sum + r.length, 0);
                    let avgLen = totalLen / validRuns.length;

                    let binaryString = "";
                    for (let j = 0; j < 6; j++) {
                        binaryString += validRuns[j].length > avgLen ? "1" : "0";
                    }

                    binaryResult.innerText = binaryString;
                    
                    if (cardDatabase[binaryString]) {
                        let matchedCard = cardDatabase[binaryString];
                        cardResult.innerText = matchedCard;
                        statusText.innerText = "KART ALGILANDI! (Sistem kilitlendi)";
                        playBeep();
                        
                        // AKILLI EKRAN DONDURMA TETİKLEYİCİSİ
                        isFrozen = true;
                        setTimeout(() => {
                            isFrozen = false;
                            statusText.innerText = "Barkod bekleniyor...";
                        }, 1200); /* 1.2 saniye boyunca ekranı sabit tutar, biplemeyi keser */

                    } else {
                        cardResult.innerText = "Şifre Çözülemedi";
                        statusText.innerText = "Hassasiyet çubuğunu kaydırarak çizgileri netleştirin.";
                    }
                } else {
                    statusText.innerText = "Net barkod çizgisi aranıyor...";
                }

            } catch (e) {
                console.error(e);
            }

            setTimeout(analyzeFrame, 130); 
        }

        if (document.readyState === "loading") {
            window.addEventListener('DOMContentLoaded', initCamera);
        } else {
            initCamera();
        }
    </script>
</body>
</html>
