<!doctype html> 
<html lang="tr"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>İskambil Barkod Okuyucu</title> 
    <style> 
        body { 
            font-family: arial, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        } 
        h2 { 
            margin: 10px 0; 
            color: #00ffcc; 
            font-size: 1.2rem; 
        } 
        .container { 
            position: relative; 
            width: 100%; 
            max-width: 400px; 
            border-radius: 8px; 
            overflow: hidden; 
            background: #222;
            height: 340px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        } 
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
        } 
        canvas { 
            display: none; 
        } 
        .overlay { 
            position: absolute; 
            top: 35%; 
            left: 5%; 
            width: 90%; 
            height: 25%; 
            border: 3px dashed #00ffcc; 
            box-sizing: border-box; 
            pointer-events: none; 
            z-index: 10; 
        } 
        .overlay-text { 
            position: absolute; 
            top: -25px; 
            left: 0; 
            color: #00ffcc; 
            font-size: 0.8rem; 
            background: rgba(0,0,0,0.6); 
            padding: 2px 5px; 
        } 
        .scan-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 3px;
            background: #ff3333; 
            z-index: 11;
        }
        .result-box { 
            margin-top: 15px; 
            width: 90%; 
            max-width: 360px; 
            background: #1e1e1e; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            text-align: center; 
        } 
        .binary { 
            font-size: 1.6rem; 
            font-weight: bold; 
            color: #ffcc00; 
            letter-spacing: 4px; 
            margin: 5px 0; 
        } 
        .card-name { 
            font-size: 1.8rem; 
            font-weight: bold; 
            color: #00ffaa; 
        } 
        .status { 
            font-size: 0.9rem; 
            color: #00ffcc; 
            margin-top: 5px; 
        } 
    </style> 
</head>
<body>

    <h2>İskambil Barkod Taraması</h2>

    <div class="container">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay">
            <span class="overlay-text">Barkodu Kırmızı Çizgiye Hizalayın</span>
            <div class="scan-line"></div>
        </div>
    </div>

    <canvas id="analyzerCanvas"></canvas>

    <div class="result-box">
        <div class="status" id="status">Kamera başlatılıyor...</div>
        <div class="binary" id="binaryResult">000000</div>
        <div class="card-name" id="cardResult">-</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('analyzerCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const binaryResult = document.getElementById('binaryResult');
        const cardResult = document.getElementById('cardResult');

        const cardDatabase = {
            "000001": "Sinek As (A♣)", "000010": "Sinek 2 (2♣)", "000011": "Sinek 3 (3♣)", "000100": "Sinek 4 (4♣)",
            "000101": "Sinek 5 (5♣)", "000110": "Sinek 6 (6♣)", "000111": "Sinek 7 (7♣)", "001000": "Sinek 8 (8♣)",
            "001001": "Sinek 9 (9♣)", "001010": "Sinek 10 (10♣)", "001011": "Sinek Vale (J♣)", "001100": "Sinek Kız (Q♣)",
            "001101": "Sinek Papaz (K♣)",
            "001110": "Karo As (A♦)", "001111": "Karo 2 (2♦)", "010000": "Karo 3 (3♦)", "010001": "Karo 4 (4♦)",
            "010010": "Karo 5 (5♦)", "010011": "Karo 6 (6♦)", "010100": "Karo 7 (7♦)", "010101": "Karo 8 (8♦)",
            "010110": "Karo 9 (9♦)", "010111": "Karo 10 (10♦)", "011000": "Karo Vale (J♦)", "011001": "Karo Kız (Q♦)",
            "011010": "Karo Papaz (K♦)",
            "011011": "Kupa As (A♥)", "011100": "Kupa 2 (2♥)", "011101": "Kupa 3 (3♥)", "011110": "Kupa 4 (4♥)",
            "011111": "Kupa 5 (5♥)", "100000": "Kupa 6 (6♥)", "100001": "Kupa 7 (7♥)", "100010": "Kupa 8 (8♥)",
            "100011": "Kupa 9 (9♥)", "100100": "Kupa 10 (10♥)", "100101": "Kupa Kız (Q♥)", "100110": "Kupa Vale (J♥)",
            "100111": "Kupa Papaz (K♥)",
            "101000": "Maça As (A♠)", "101001": "Maça 2 (2♠)", "101010": "Maça 3 (3♠)", "101011": "Maça 4 (4♠)",
            "101100": "Maça 5 (5♠)", "101101": "Maça 6 (6♠)", "101110": "Maça 7 (7♠)", "101111": "Maça 8 (8♠)",
            "110000": "Maça 9 (9♠)", "110001": "Maça 10 (10♠)", "110010": "Maça Vale (J♠)", "110011": "Maça Kız (Q♠)",
            "110100": "Maça Papaz (K♠)"
        };
        async function initCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                statusText.innerHTML = "<span style='color:#ff3333'>HATA: HTTPS bağlantısı gerekli!</span>";
                return;
            }
            try {
                // Çizgileri yakalayabilmek için Full HD Arka Kamera zorunlu kılındı
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                video.srcObject = stream;
                statusText.innerText = "Kamera aktif. Barkod çizgilerini kırmızı hatta hizalayın.";
                requestAnimationFrame(analyzeFrame);
            } catch (err) {
                statusText.innerHTML = "<span style='color:#ff3333'>Kamera Erişim Hatası: " + err.name + "</span>";
            }
        }

        // Otsu Algoritması: Işık ve parlamalara göre en ideal siyah-beyaz sınırını bulur
        function getOtsuThreshold(histogram, totalPixels) {
            let sum = 0;
            for (let i = 0; i < 256; i++) sum += i * histogram[i];
            let sumB = 0, wB = 0, wF = 0;
            let varMax = 0, threshold = 128;
            for (let i = 0; i < 256; i++) {
                wB += histogram[i];
                if (wB === 0) continue;
                wF = totalPixels - wB;
                if (wF === 0) break;
                sumB += i * histogram[i];
                let mB = sumB / wB;
                let mF = (sum - sumB) / wF;
                let varBetween = wB * wF * (mB - mF) * (mB - mF);
                if (varBetween > varMax) {
                    varMax = varBetween;
                    threshold = i;
                }
            }
            return threshold;
        }

        function analyzeFrame() {
            if (video.paused || video.ended || video.readyState < 2) {
                requestAnimationFrame(analyzeFrame);
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            try {
                let cropX = Math.floor(canvas.width * 0.15);
                let cropWidth = Math.floor(canvas.width * 0.70);
                let centerY = Math.floor(canvas.height * 0.48);
                let scanHeight = 30; // Çizgi netliği için dikey 30 satır taranır

                let imgData = ctx.getImageData(cropX, centerY - 15, cropWidth, scanHeight);
                let pixels = imgData.data;

                // 1. ADIM: Dikey Matris Sıkıştırma (Vertical Projection)
                // Bu işlem el titremesini ve karıncalanmaları tamamen yok eder
                let lumaValues = new Float32Array(cropWidth);
                let histogram = new Int32Array(256);

                for (let col = 0; col < cropWidth; col++) {
                    let colSum = 0;
                    for (let row = 0; row < scanHeight; row++) {
                        let idx = (row * cropWidth + col) * 4;
                        let bright = pixels[idx] * 0.299 + pixels[idx+1] * 0.587 + pixels[idx+2] * 0.114;
                        colSum += bright;
                    }
                    let avgBright = Math.floor(colSum / scanHeight);
                    lumaValues[col] = avgBright;
                    histogram[avgBright]++;
                }

                // 2. ADIM: Otsu Eşikleme ile Siyah/Beyaz Ayrımı
                let otsuThresh = getOtsuThreshold(histogram, cropWidth);

                // Gelişmiş Gürültü Koruması: Ekranda belirgin bir kontrast (siyah-beyaz farkı) yoksa işlemi keser
                let max = Math.max(...lumaValues);
                let min = Math.min(...lumaValues);
                if ((max - min) < 80) {
                    binaryResult.innerText = "000000";
                    cardResult.innerText = "-";
                    statusText.innerText = "Çizgi tespit edilmedi. Kırmızı hatta hizalayın.";
                    requestAnimationFrame(analyzeFrame);
                    return;
                }

                // 3. ADIM: Çizgi Kalınlık Analizi (Run-Length)
                let currentBit = lumaValues[0] > otsuThresh ? 1 : 0;
                let bitRunLength = 0;
                let runs = [];

                for (let i = 0; i < lumaValues.length; i++) {
                    let bit = lumaValues[i] > otsuThresh ? 1 : 0;
                    if (bit === currentBit) {
                        bitRunLength++;
                    } else {
                        runs.push({ bit: currentBit, length: bitRunLength });
                        currentBit = bit;
                        bitRunLength = 1;
                    }
                }
                runs.push({ bit: currentBit, length: bitRunLength });

                // Çok küçük pürüzleri temizle
                let validRuns = runs.filter(r => r.length > 4);

                // Gerçek casino protokolü tam olarak 6 çizgi bloğundan oluşur
                if (validRuns.length === 6) {
                    let totalLen = validRuns.reduce((sum, r) => sum + r.length, 0);
                    let avgLen = totalLen / validRuns.length;

                    let binaryString = "";
                    for (let j = 0; j < 6; j++) {
                        binaryString += validRuns[j].length > avgLen ? "1" : "0";
                    }

                    binaryResult.innerText = binaryString;
                    
                    if (cardDatabase[binaryString]) {
                        cardResult.innerText = cardDatabase[binaryString];
                        statusText.innerText = "Kart başarıyla okundu!";
                        playBeep();
                        // Kararlılık için okuma sonrası kısa bir bekleme
                        setTimeout(() => { requestAnimationFrame(analyzeFrame); }, 1500);
                        return;
                    } else {
                        cardResult.innerText = "Bilinmeyen Kod";
                        statusText.innerText = "Çizgileri hizalayın veya mesafeyi değiştirin.";
                    }
                } else {
                    statusText.innerText = "Net barkod çizgisi aranıyor...";
                }

            } catch (e) {
                console.error(e);
            }

            requestAnimationFrame(analyzeFrame);
        }

        if (document.readyState === "loading") {
            window.addEventListener('DOMContentLoaded', initCamera);
        } else {
            initCamera();
        }
    </script>
</body>
</html>
