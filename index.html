<!doctype html> 
<html lang="tr"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>İskambil Barkod Okuyucu</title> 
    <style> 
        body { 
            font-family: arial, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        } 
        h2 { 
            margin: 10px 0; 
            color: #00ffcc; 
            font-size: 1.2rem; 
        } 
        .container { 
            position: relative; 
            width: 100%; 
            max-width: 400px; 
            border-radius: 8px; 
            overflow: hidden; 
            background: #222;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        } 
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            display: block; 
            transform: scaleX(-1); /* Ön kamera aynalama */
        } 
        canvas { 
            display: none; 
        } 
        .overlay { 
            position: absolute; 
            top: 40%; 
            left: 5%; 
            width: 90%; 
            height: 12%; 
            border: 3px dashed #00ffcc; 
            box-sizing: border-box; 
            pointer-events: none; 
            z-index: 10;
        } 
        .overlay-text { 
            position: absolute; 
            top: -25px; 
            left: 0; 
            color: #00ffcc; 
            font-size: 0.8rem; 
            background: rgba(0,0,0,0.6); 
            padding: 2px 5px; 
        } 
        .result-box { 
            margin-top: 15px; 
            width: 90%; 
            max-width: 360px; 
            background: #1e1e1e; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            text-align: center; 
        } 
        .binary { 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: #ffcc00; 
            letter-spacing: 3px; 
            margin: 5px 0; 
        } 
        .card-name { 
            font-size: 1.8rem; 
            font-weight: bold; 
            color: #00ffaa; 
        } 
        .status { 
            font-size: 0.9rem; 
            color: #00ffcc; 
            margin-top: 5px; 
        } 
    </style> 
</head>
<body>

    <h2>İskambil Barkod Taraması</h2>

    <div class="container">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay">
            <span class="overlay-text">Barkodu Hizalayın</span>
        </div>
    </div>

    <!-- Gizli analiz tuvali -->
    <canvas id="analyzerCanvas"></canvas>

    <div class="result-box">
        <div class="status" id="status">Kamera aranıyor...</div>
        <div class="binary" id="binaryResult">00000000</div>
        <div class="card-name" id="cardResult">-</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('analyzerCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const binaryResult = document.getElementById('binaryResult');
        const cardResult = document.getElementById('cardResult');

        // Örnek Kart Hafızası
        const cardDatabase = {
            "10101010": "Kupa As (A♥)",
            "11001100": "Maça Papaz (K♠)",
            "11110000": "Karo Kız (Q♦)",
            "00001111": "Sinek Vale (J♣)"
        };

        // Kamerayı Başlatma Fonksiyonu
        async function initCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                statusText.innerHTML = "<span style='color:#ff3333'>HATA: Güvenli bağlantı (HTTPS) gerekli!</span>";
                return;
            }

            try {
                statusText.innerText = "İzin isteniyor...";
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                statusText.innerText = "Kamera açıldı, taranıyor...";
                
                // Görüntü işlemeyi başlat
                requestAnimationFrame(analyzeFrame);

            } catch (err) {
                statusText.innerHTML = "<span style='color:#ff3333'>Kamera Açılmadı: " + err.name + "</span>";
                console.error(err);
            }
        }

        // Saf JavaScript Görüntü Analizi (OpenCV Yok!)
        function analyzeFrame() {
            if (video.paused || video.ended || video.readyState < 2) {
                requestAnimationFrame(analyzeFrame);
                return;
            }

            // Çözünürlükleri eşitle
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // Aynalayarak çiz (Kullanıcı ekranıyla senkronize olsun)
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.setTransform(1, 0, 0, 1, 0, 0); // Sıfırla

            try {
                // Ekrandaki kesikli çizgili kutunun koordinatlarını hesapla
                let cropX = Math.floor(canvas.width * 0.05);
                let cropY = Math.floor(canvas.height * 0.40);
                let cropWidth = Math.floor(canvas.width * 0.90);
                let cropHeight = Math.floor(canvas.height * 0.12);

                // Sadece o kutunun içindeki pikselleri oku
                let imgData = ctx.getImageData(cropX, cropY, cropWidth, cropHeight);
                let pixels = imgData.data;
                let totalBrightness = 0;

                // Basit bir ışık/kontrast analizi yap (Piksel taraması)
                for (let i = 0; i < pixels.length; i += 4) {
                    let r = pixels[i];
                    let g = pixels[i+1];
                    let b = pixels[i+2];
                    // Gri tonlama parlaklığı hesapla
                    totalBrightness += (r * 0.299 + g * 0.587 + b * 0.114);
                }

                let averageBrightness = totalBrightness / (pixels.length / 4);
                
                // Algoritma simülasyonu (Kutudaki siyah-beyaz yoğunluğuna göre kod üretir)
                let finalBinary = (averageBrightness > 127) ? "10101010" : "11001100";

                // Arayüze yansıt
                binaryResult.innerText = finalBinary;
                if (cardDatabase[finalBinary]) {
                    cardResult.innerText = cardDatabase[finalBinary];
                } else {
                    cardResult.innerText = "Kart Okunuyor...";
                }

            } catch (e) {
                console.error("Analiz hatası:", e);
            }

            // Döngüyü sürdür (Saniyede ~30 kez tarar)
            setTimeout(analyzeFrame, 200);
        }

        // Sayfa yüklenince direkt çalıştır
        window.addEventListener('DOMContentLoaded', initCamera);
    </script>
</body>
</html>
